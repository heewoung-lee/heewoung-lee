<svg xmlns="http://www.w3.org/2000/svg" width="900" height="90" viewBox="0 0 900 90" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Section divider for Tech Stack</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.5" stop-color="#0c1822"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5f6d7a" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#7f8b98" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5f6d7a" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="90" fill="url(#bg)"/>
  <line x1="16" y1="58" x2="348" y2="58" stroke="url(#line)" stroke-width="2"/>
  <line x1="552" y1="58" x2="884" y2="58" stroke="url(#line)" stroke-width="2"/>

  <g transform="translate(429 12)" fill="none" stroke="#8ff0b0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M15 11 5 22l10 11"/>
    <path d="M29 11 39 22 29 33"/>
    <path d="M25 7 18 37"/>
  </g>

  <text x="450" y="68" fill="#f2f6fb" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">Tech Stack</text>
</svg>
